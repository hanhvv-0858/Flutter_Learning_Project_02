name: example_flutter_02
description: "Flutter music discovery app with Clean Architecture"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Networking
  dio: ^5.7.0

  # Navigation
  go_router: ^14.8.0

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Image Caching
  cached_network_image: ^3.4.1

  # Local Storage
  sqflite: ^2.4.1
  shared_preferences: ^2.3.4

  # Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Functional Error Handling
  dartz: ^0.10.1

  # Internationalization
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

  # Code Generation
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  injectable_generator: ^2.7.0

flutter:
  uses-material-design: true
  generate: true
